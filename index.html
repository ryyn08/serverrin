<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a192f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 300px; }
        .status { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="glass">
        <h3><i class="fas fa-server"></i> RYYN PROXY STATUS</h3>
        <div id="info">Memuat data...</div>
    </div>
    <script>
        setInterval(() => {
            fetch('/server/1').then(r => r.json()).then(d => {
                document.getElementById('info').innerHTML = 
                `<i class="fas fa-globe"></i> ${d.name}<br>
                 Status: ${d.active ? '<span style="color:lime">ONLINE</span>' : '<span style="color:red">DISCONNECT (Cooldown)</span>'}<br>
                 Latency: ${d.ms}ms`;
            });
        }, 1000);
    </script>
</body>
</html>
